name: Build macOS DMG

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write  # potřeba pro Create GitHub Release step

jobs:
  build:
    # macos-latest = M-series runner (arm64). Pro x86_64 použij macos-13.
    # Universal build (oba) je nejlepší pro distribuci.
    runs-on: macos-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-macos-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache vendored FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: app/vendor/ffmpeg/macos
          key: ffmpeg-macos-v2

      - name: Download FFmpeg static build (macOS)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: python scripts/download_ffmpeg_macos.py

      - name: Generate icons (PNG + ICNS)
        run: python scripts/generate_icon.py

      - name: Inject production HMAC secret
        env:
          HDT_HMAC_SECRET: ${{ secrets.HDT_HMAC_SECRET }}
        shell: bash
        run: |
          if [ -z "$HDT_HMAC_SECRET" ]; then
            echo "HDT_HMAC_SECRET not set in GitHub Actions secrets" >&2
            exit 1
          fi
          cat > app/licensing/_secret.py <<EOF
          # AUTO-GENERATED by CI build — DO NOT COMMIT
          from __future__ import annotations
          KEY_PREFIX: str = "S4F1"
          HMAC_SECRET: bytes = b"${HDT_HMAC_SECRET}"
          EOF
          echo "Secret injected"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean \
            --onedir --windowed \
            --name HlasDoTextu \
            --icon app/resources/icon.icns \
            --osx-bundle-identifier cz.safe4future.hlasdotextu \
            --add-data "app/vendor/ffmpeg/macos:vendor/ffmpeg/macos" \
            --add-data "app/resources:resources" \
            --add-data "app/gui/styles:app/gui/styles" \
            --collect-all ctranslate2 \
            --collect-all faster_whisper \
            --collect-all tiktoken \
            --collect-all tiktoken_ext \
            --hidden-import=tiktoken_ext.openai_public \
            --hidden-import=tiktoken_ext \
            --collect-all yt_dlp \
            --collect-all genanki \
            --collect-data certifi \
            app/__main__.py

      - name: Make FFmpeg binaries executable in .app bundle
        run: |
          chmod +x "dist/HlasDoTextu.app/Contents/Resources/vendor/ffmpeg/macos/ffmpeg" 2>/dev/null || \
          chmod +x "dist/HlasDoTextu.app/Contents/MacOS/vendor/ffmpeg/macos/ffmpeg" 2>/dev/null || true
          chmod +x "dist/HlasDoTextu.app/Contents/Resources/vendor/ffmpeg/macos/ffprobe" 2>/dev/null || \
          chmod +x "dist/HlasDoTextu.app/Contents/MacOS/vendor/ffmpeg/macos/ffprobe" 2>/dev/null || true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Read version from app/__init__.py
        id: version
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*[\"\']([^\"\']+)[\"\']', open('app/__init__.py').read()).group(1))")
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create DMG
        run: |
          mkdir -p installer/Output
          create-dmg \
            --volname "Hlas do textu" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "HlasDoTextu.app" 175 190 \
            --hide-extension "HlasDoTextu.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "installer/Output/HlasDoTextu-${{ steps.version.outputs.value }}.dmg" \
            "dist/HlasDoTextu.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HlasDoTextu-macOS-DMG
          path: installer/Output/*.dmg

      - name: Create GitHub Release (tagged builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.dmg
          generate_release_notes: false
          fail_on_unmatched_files: true
