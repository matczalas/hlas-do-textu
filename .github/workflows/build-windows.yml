name: Build Windows installer

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write  # nutné pro Create GitHub Release step

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Cache vendored FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: app/vendor/ffmpeg/win64
          key: ffmpeg-win64-v1

      - name: Download FFmpeg static build
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: python scripts/download_ffmpeg_windows.py

      - name: Generate placeholder icon
        run: python scripts/generate_icon.py

      - name: Inject production HMAC secret
        env:
          HDT_HMAC_SECRET: ${{ secrets.HDT_HMAC_SECRET }}
        shell: pwsh
        run: |
          if (-not $env:HDT_HMAC_SECRET) {
            Write-Error "HDT_HMAC_SECRET not set in GitHub Actions secrets"
            exit 1
          }
          $content = @"
          # AUTO-GENERATED by CI build — DO NOT COMMIT
          # Production HMAC secret hard-coded for offline license validation.
          from __future__ import annotations

          KEY_PREFIX: str = "S4F1"
          HMAC_SECRET: bytes = b"$($env:HDT_HMAC_SECRET)"
          "@
          $content | Out-File -FilePath app/licensing/_secret.py -Encoding ascii -NoNewline
          Write-Host "Secret injected — _secret.py přepsán pro build"

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean ^
            --onedir --windowed ^
            --name HlasDoTextu ^
            --icon app/resources/icon.ico ^
            --add-data "app/vendor/ffmpeg/win64;vendor/ffmpeg/win64" ^
            --add-data "app/resources;resources" ^
            --add-data "app/gui/styles;app/gui/styles" ^
            --collect-all ctranslate2 ^
            --collect-all faster_whisper ^
            --collect-all tiktoken ^
            --collect-all tiktoken_ext ^
            --hidden-import=tiktoken_ext.openai_public ^
            --hidden-import=tiktoken_ext ^
            --collect-data certifi ^
            app/__main__.py
        shell: cmd

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\HlasDoTextu.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HlasDoTextu-Windows-Installer
          path: installer/Output/*.exe

      - name: Create GitHub Release (tagged builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          generate_release_notes: true
